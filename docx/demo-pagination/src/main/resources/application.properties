spring.application.name=demo-pagination
# Database Connection
#spring.datasource.url=jdbc:postgresql://localhost:5444/paginationdb
#spring.datasource.username=postgres
Vspring.datasource.password=

# JPA / Hibernate Settings
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Port (Matches your React API calls)
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/registrydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# H2 Console (Access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Settings for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true